name: pgfleet

services:
  meta-db:
    image: postgres:16
    container_name: pgfleet-meta-db
    environment:
      POSTGRES_USER: pgfleet
      POSTGRES_PASSWORD: pgfleet
      POSTGRES_DB: pgfleet
    ports:
      - "5433:5432"
    volumes:
      - meta-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgfleet"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: pgfleet-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pgfleet
      MINIO_ROOT_PASSWORD: pgfleetpgfleet
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
      - ./certs:/root/.minio/certs:ro
    healthcheck:
      # -k skips cert verification for the self-signed cert
      test: ["CMD-SHELL", "curl -sk https://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  meta-db-data:
  minio-data:

networks:
  default:
    name: pgfleet
    external: true
