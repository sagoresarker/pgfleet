# PgFleet behind Authelia (forward-auth single sign-on).
#
# Topology:
#   internet ──▶ Caddy (TLS + reverse proxy + forward_auth)
#                  │  (unauthenticated requests are sent to Authelia first)
#                  ├──▶ Authelia  (login portal, MFA/TOTP, brute-force regulation)
#                  └──▶ PgFleet UI + API   (only after Authelia approves; Caddy
#                       injects the verified Remote-Email / Remote-Groups headers,
#                       which PgFleet exchanges for its own session token)
#
# This protects the admin dashboard from credential-stuffing/cracking: every
# request is authenticated by Authelia (with MFA + rate-limited login) BEFORE it
# ever reaches PgFleet. PgFleet still keeps its own users/roles/audit trail via
# the trusted-header SSO exchange (PGFLEET_SSO_EMAIL_HEADER).
#
# Bring your own meta-db + MinIO (see ../docker-compose.yml) or add them here.

services:
  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - authelia
      - pgfleet-ui
      - pgfleet-api
    networks: [edge]

  authelia:
    image: authelia/authelia:4.38
    restart: unless-stopped
    volumes:
      - ./authelia:/config
    environment:
      # In production, supply these via Docker secrets or a vault, not inline.
      AUTHELIA_SESSION_SECRET: "change-me-session-secret-min-64-chars-0000000000000000000000"
      AUTHELIA_STORAGE_ENCRYPTION_KEY: "change-me-storage-encryption-key-min-64-chars-00000000000000"
      AUTHELIA_JWT_SECRET: "change-me-identity-validation-jwt-secret-0000000000000000000000"
    networks: [edge]

  pgfleet-api:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PGFLEET_HTTP_ADDR: ":8080"
      # meta-db and MinIO live on the pgfleet network (from ../docker-compose.yml)
      PGFLEET_META_DB_DSN: "postgres://pgfleet:pgfleet@pgfleet-meta-db:5432/pgfleet?sslmode=disable"
      PGFLEET_JWT_SECRET: "change-me-pgfleet-jwt-secret-at-least-32-bytes-long"
      PGFLEET_MASTER_KEY: "REPLACE_WITH_BASE64_32_BYTE_KEY="
      # --- Trusted-header SSO (must match the headers Caddy injects below) ---
      PGFLEET_SSO_EMAIL_HEADER: "Remote-Email"
      PGFLEET_SSO_GROUPS_HEADER: "Remote-Groups"
      PGFLEET_SSO_AUTO_PROVISION: "true"
      PGFLEET_SSO_ADMIN_GROUP: "pgfleet-admins"
      PGFLEET_SSO_OPERATOR_GROUP: "pgfleet-operators"
      # S3/MinIO — both host and container reach MinIO by its Docker name
      PGFLEET_S3_ENDPOINT: "pgfleet-minio:9000"
      PGFLEET_S3_BACKREST_ENDPOINT: "pgfleet-minio:9000"
      PGFLEET_S3_BUCKET: "pgbackrest"
      PGFLEET_S3_REGION: "us-east-1"
      PGFLEET_S3_ACCESS_KEY: "pgfleet"
      PGFLEET_S3_SECRET_KEY: "pgfleetpgfleet"
      PGFLEET_S3_USE_TLS: "true"
      PGFLEET_S3_TLS_SKIP_VERIFY: "true"
      PGFLEET_DOCKER_NETWORK: "pgfleet"
      # The API is reachable ONLY through Caddy on this network — never publish
      # its port to the host, or the trusted header could be spoofed directly.
    expose:
      - "8080"
    networks: [edge, pgfleet]
    # Managed Postgres instances are created via the host Docker socket.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  pgfleet-ui:
    build:
      context: ../../web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_OIDC_ENABLED: "1"
      NEXT_PUBLIC_OIDC_LABEL: "Sign in with SSO"
      NEXT_PUBLIC_API_BASE: "" # same origin behind Caddy
    expose:
      - "3000"
    networks: [edge]

volumes:
  caddy_data:
  caddy_config:

networks:
  edge:
    driver: bridge
  pgfleet:
    external: true  # created by ../docker-compose.yml (or `docker network create pgfleet`)
